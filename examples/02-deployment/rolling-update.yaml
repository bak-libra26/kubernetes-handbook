apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1          # 최대 1개 추가 Pod 허용
      maxUnavailable: 0    # 항상 3개 유지 → 무중단
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          # 주의: readinessProbe 없으면 초기화 중인 Pod에 트래픽 유입
          readinessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 5
