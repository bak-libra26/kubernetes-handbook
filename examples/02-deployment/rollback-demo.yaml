# 롤백 테스트용: 일부러 잘못된 이미지로 배포
# kubectl rollout undo deployment/rollback-demo 로 복구
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rollback-demo
  annotations:
    # 주의: 변경 원인을 기록해두면 rollout history에서 확인 가능
    kubernetes.io/change-cause: "nginx 1.99 (존재하지 않는 버전)"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rollback-demo
  template:
    metadata:
      labels:
        app: rollback-demo
    spec:
      containers:
        - name: nginx
          # 주의: 존재하지 않는 태그 → ImagePullBackOff 발생
          image: nginx:1.99-does-not-exist
          ports:
            - containerPort: 80
