# Ingress — L7 라우팅으로 하나의 외부 IP에서 경로별로 서비스 분기
# 사전 조건: Ingress Controller(nginx, traefik 등)가 클러스터에 설치되어 있어야 동작
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx   # [함정] 생략하면 기본 IngressClass가 없을 때 라우팅이 안 됨
  rules:
    - host: myapp.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-api
                port:
                  number: 8080
# [함정] pathType을 ImplementationSpecific으로 두면 컨트롤러마다 동작이 달라진다
# 명시적으로 Prefix 또는 Exact를 지정하는 것이 안전하다
