# ConfigMap: 설정 데이터를 Pod와 분리하여 관리
# 주의: ConfigMap 변경 후 Pod를 재시작해야 반영됨 (volume 마운트 제외)
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  APP_ENV: "production"
  APP_LOG_LEVEL: "info"
  # 파일 형태의 설정도 가능
  nginx.conf: |
    server {
      listen 80;
      location / {
        return 200 'OK';
      }
    }
