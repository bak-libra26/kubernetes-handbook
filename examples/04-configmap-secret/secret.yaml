# Secret: 민감 정보 저장 (base64 인코딩)
# 주의: base64는 암호화가 아님! etcd 암호화를 별도 설정해야 안전
apiVersion: v1
kind: Secret
metadata:
  name: db-secret
type: Opaque
data:
  # echo -n 'admin' | base64 → YWRtaW4=
  DB_USER: YWRtaW4=
  # echo -n 'p@ssw0rd' | base64 → cEBzc3cwcmQ=
  DB_PASSWORD: cEBzc3cwcmQ=
# stringData를 쓰면 평문 입력 가능 (자동 인코딩)
# stringData:
#   DB_USER: admin
