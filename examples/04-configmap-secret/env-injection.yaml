# ConfigMap + Secret을 환경변수로 주입하는 Pod
# 주의: envFrom은 키 전체를, env + valueFrom은 개별 키를 주입
apiVersion: v1
kind: Pod
metadata:
  name: env-demo
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["sh", "-c", "env && sleep 3600"]
      envFrom:
        # ConfigMap의 모든 키를 환경변수로 주입
        - configMapRef:
            name: app-config
      env:
        # Secret에서 개별 키만 선택 주입
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: DB_PASSWORD
