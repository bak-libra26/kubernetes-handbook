# 사이드카 패턴: 메인 컨테이너 + 로그 수집 컨테이너
# 같은 Pod 내 컨테이너는 localhost로 통신 가능
apiVersion: v1
kind: Pod
metadata:
  name: multi-container
spec:
  containers:
    - name: web
      image: nginx:1.27-alpine
      volumeMounts:
        - name: shared-logs
          mountPath: /var/log/nginx
    - name: log-reader
      # 사이드카: nginx 로그를 실시간으로 출력
      image: busybox:1.36
      command: ["sh", "-c", "tail -f /logs/access.log"]
      volumeMounts:
        - name: shared-logs
          mountPath: /logs
  volumes:
    # 주의: emptyDir는 Pod 삭제 시 데이터도 사라짐
    - name: shared-logs
      emptyDir: {}
